<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard JSA</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="navbar-brand">
            <div class="brand-icon">📋</div>
            <div>
                <div class="brand-title">Dashboard JSA</div>
                <div class="brand-sub">Job Safety Analysis Monitoring</div>
            </div>
        </div>

        <div class="filters">
            <div class="filter-group">
                <label class="filter-label">Bulan</label>
                <select id="bulan">
                    <option value="april2026">April 2026</option>
                    <option value="mei2026">Mei 2026</option>
                    <option value="juni2026">Juni 2026</option>
                    <option value="juli2026">Juli 2026</option>
                    <option value="agustus2026">Agustus 2026</option>
                </select>
            </div>

            <div class="filter-group">
                <label class="filter-label">Divisi</label>
                <select id="divisi">
                    <option value="">All Divisi</option>
                    <option value="Production Plant 1 Division">Production Plant 1 Division</option>
                    <option value="Corporate Supply Chain Management Division">Corporate Supply Chain Management Division</option>
                    <option value="Corporate Quality Division">Corporate Quality Division</option>
                    <option value="Corporate Engineering Division">Corporate Engineering Division</option>
                    <option value="Corporate Research & Development Division">Corporate Research &amp; Development Division</option>
                </select>
            </div>

            <div class="filter-group">
                <label class="filter-label">Departemen</label>
                <select id="deptSelect">
                    <option value="all">All Department</option>
                </select>
            </div>
        </div>
    </nav>

    <!-- MAIN VIEW -->
    <div id="view-home" class="view active">

        <!-- HEADER INFO -->
        <div id="headerInfo">
            <div class="header-top">
                <div id="judulDept" class="dept-label">All Department</div>
                <div id="judul-bulan" class="bulan-badge">APRIL 2026</div>
            </div>
            <div class="header-title">Total Achievement</div>
            <div id="homeSummary"></div>
        </div>

        <!-- SEARCH (hanya untuk detail dept) -->
        <div id="searchContainer">
            <div class="search-wrap">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Cari nama karyawan..." />
            </div>
        </div>

        <!-- CHART BOX -->
        <div id="chartbox">
            <canvas id="chart-all"></canvas>
        </div>

        <!-- JSA TOTAL ACHIEVEMENT WIDGET -->
        <div id="jsa-container">
            <div class="jsa-bg-blur bl1"></div>
            <div class="jsa-bg-blur bl2"></div>
            <div class="jsa-bg-blur bl3"></div>

            <div class="jsa-top">
                <div class="jsa-badge">
                    <span class="live-dot"></span>
                    LIVE MONITORING
                </div>
                <div class="jsa-title">TOTAL ACHIEVEMENT JSA</div>
                <div class="jsa-subtitle">Employee Completion Progress</div>
            </div>

            <div class="jsa-center">
                <div class="jsa-ring">
                    <div class="jsa-ring-inner">
                        <div class="ring-label">Achievement</div>
                        <div id="total-jsa-value">0%</div>
                    </div>
                </div>

                <div class="jsa-count-wrap">
                    <div class="jsa-count-card">
                        <div class="card-icon">🏆</div>
                        <div class="count-label">Completed</div>
                        <div id="jsa-filled" class="count-value">0</div>
                        <div class="count-sub">karyawan</div>
                    </div>
                    <div class="jsa-count-card">
                        <div class="card-icon">🧑‍💼</div>
                        <div class="count-label">Total Employee</div>
                        <div id="jsa-total" class="count-value">0</div>
                        <div class="count-sub">karyawan</div>
                    </div>
                </div>
            </div>

            <div class="progress-label-row">
                <span>Progress Keseluruhan</span>
                <span id="progress-pct-label">0%</span>
            </div>
            <div class="jsa-progress-track">
                <div id="jsa-progress-bar"></div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
